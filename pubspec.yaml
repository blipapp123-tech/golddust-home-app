name: golddust_home_app
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.10+3

environment:
  sdk: ^3.9.2

dependencies:
  app_tracking_transparency: ^2.0.7
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  google_fonts: ^8.0.2
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  zoho_payments_flutter_sdk: ^1.0.0
  url_launcher: ^6.3.1
  share_plus: 12.0.2
  http:
  google_maps_flutter: ^2.10.0
  gradient_borders: ^1.0.1
  video_player: ^2.9.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.3.3

  sendotp_flutter_sdk:
  onesignal_flutter: ^5.6.0
  package_info_plus: 9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.webp"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.webp"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/services/
    - assets/images/work/
    - assets/images/home/hero_garden_bg.webp
    - assets/fonts/
    - assets/images/logo.webp
    - assets/videos/transform_home_garden.mp4
  fonts:
    - family: Gotham
      fonts:
        - asset: assets/fonts/Gotham Book.otf
          weight: 400
        - asset: assets/fonts/Gotham-Medium.otf
          weight: 500
